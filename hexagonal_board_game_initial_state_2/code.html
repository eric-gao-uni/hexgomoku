<style>
        :root {--s: 30px;--w: calc(var(--s) * 2); 
            --h: calc(var(--s) * 1.732);--m-x: calc(var(--w) * -0.25);--off-y: calc(var(--h) * 0.5);}
        .hex-grid-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .hex-grid {
            display: flex;
            padding: 40px;transform: translateX(calc(var(--w) * 0.125)); 
        }
        .hex-column {
            display: flex;
            flex-direction: column;
            margin-right: var(--m-x);}
        .hex-column:nth-child(even) {
            transform: translateY(var(--off-y));
        }
        .hex-cell {
            width: var(--w); 
            height: var(--h);clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            background-color: #6d3b3b;
            margin-bottom: 2px;margin-bottom: 0px; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .hex-cell::before {
            content: '';
            position: absolute;top: 2px; left: 2px; right: 2px; bottom: 2px;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            background-color: #241212;
            z-index: 0;
            transition: background-color 0.2s;
        }
        .hex-cell:hover::before {
            background-color: #351a1a;
        }
        .piece {width: calc(var(--h) * 0.65);
            height: calc(var(--h) * 0.65);
            border-radius: 50%;
            z-index: 2;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        }
        .piece::after {
            content: '';
            position: absolute;
            top: 5%; left: 15%; width: 70%; height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 100%);
            border-radius: 50%;
            opacity: 0.3;
        }
        .piece-white {
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #e0e0e0 40%, #b0b0b0 100%);
            border: 1px solid #999;
        }
        .piece-black {
            background: radial-gradient(circle at 30% 30%, #555 0%, #2a2a2a 50%, #000 100%);
            border: 1px solid #444;
        }
        .piece-red {
            background: radial-gradient(circle at 30% 30%, #ff4d4d 0%, #ec1313 50%, #990000 100%);
            border: 1px solid #800000;
        }
    </style>
