<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HexGomoku - Initial State</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec1313", // Red from the request context
                        "background-light": "#f8f6f6",
                        "background-dark": "#221010",
                        "secondary": "#2c1818", // A slightly lighter dark for contrast
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>.hex-grid {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hex-row {
            display: flex;
            margin-left: -18px;}
        .hex-row:nth-child(even) {
            margin-left: 18px;
        }
        .hex-cell {
            width: 70px;
            height: 80px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background-color: #361e1e;margin: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            position: relative;
        }
        .hex-cell:hover {
            filter: brightness(1.2);
            cursor: pointer;
        }.piece {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), inset 0 -4px 4px rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,255,0.3);
        }
        .piece-white {
            background: #f0f0f0;
            border: 2px solid #ddd;
        }
        .piece-black {
            background: #1a1a1a;
            border: 2px solid #333;
        }
        .piece-red {
            background: #ec1313;
            border: 2px solid #b90e0e;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden">
<header class="w-full bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md pt-12 pb-4 px-6 sticky top-0 z-20 shadow-sm border-b border-primary/10">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="w-10 h-10 rounded-full bg-primary/10 hover:bg-primary/20 flex items-center justify-center transition-colors text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">HexGomoku</h1>
</div>
<button class="px-4 py-2 rounded-full text-sm font-semibold text-primary hover:bg-primary/10 transition-colors">
                Reset
            </button>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center relative w-full h-full overflow-hidden">
<div class="absolute top-4 left-0 right-0 flex justify-center z-10">
<div class="bg-secondary/80 backdrop-blur-md border border-white/5 px-6 py-2 rounded-full flex items-center gap-3 shadow-lg">
<div class="w-3 h-3 rounded-full bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)]"></div>
<span class="text-sm font-medium tracking-wide">White's Turn</span>
</div>
</div>
<div class="flex flex-col items-center justify-center scale-90 md:scale-100 select-none">
<div class="hex-row">
<div class="hex-cell opacity-20"></div>
<div class="hex-cell opacity-20"></div>
<div class="hex-cell">
<div class="piece piece-white"></div>
</div>
<div class="hex-cell opacity-20"></div>
<div class="hex-cell opacity-20"></div>
</div>
<div class="hex-row">
<div class="hex-cell opacity-20"></div>
<div class="hex-cell">
<div class="piece piece-black"></div>
</div>
<div class="hex-cell">
<div class="piece piece-red"></div>
</div>
<div class="hex-cell opacity-20"></div>
</div>
<div class="hex-row">
<div class="hex-cell opacity-20"></div>
<div class="hex-cell">
<div class="piece piece-black"></div>
</div>
<div class="hex-cell">
</div>
<div class="hex-cell">
<div class="piece piece-white"></div>
</div>
<div class="hex-cell opacity-20"></div>
</div>
<div class="hex-row">
<div class="hex-cell opacity-20"></div>
<div class="hex-cell">
<div class="piece piece-white"></div>
</div>
<div class="hex-cell">
<div class="piece piece-red"></div>
</div>
<div class="hex-cell">
<div class="piece piece-black"></div>
</div>
</div>
<div class="hex-row">
<div class="hex-cell opacity-20"></div>
<div class="hex-cell opacity-20"></div>
<div class="hex-cell"></div> 
<div class="hex-cell opacity-20"></div>
<div class="hex-cell opacity-20"></div>
</div>
</div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[60%] bg-primary/5 blur-[100px] rounded-full pointer-events-none z-[-1]"></div>
</main>
<footer class="w-full bg-background-light dark:bg-background-dark pb-8 pt-4 px-6 z-20">
<div class="max-w-md mx-auto flex flex-col gap-6">
<div class="flex justify-between items-center text-xs font-medium text-slate-500 dark:text-slate-400">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">timer</span>
<span>00:12</span>
</div>
<div>Move 1</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-14 rounded-xl bg-secondary hover:bg-secondary/80 text-slate-200 font-bold transition-all border border-white/5 active:scale-95">
<span class="material-symbols-outlined">undo</span>
                    Undo
                </button>
<button class="flex items-center justify-center gap-2 h-14 rounded-xl bg-primary hover:bg-red-600 text-white font-bold shadow-lg shadow-primary/25 transition-all active:scale-95">
<span class="material-symbols-outlined">check</span>
                    Confirm
                </button>
</div>
</div>
</footer>
<div aria-modal="true" class="fixed inset-0 z-50 flex items-center justify-center px-4" role="dialog">
<div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity"></div>
<div class="relative bg-white dark:bg-[#2c1818] rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform transition-all border border-white/10">
<div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
<div class="p-8">
<div class="flex flex-col items-center mb-6">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-3 text-primary">
<span class="material-symbols-outlined text-3xl">menu_book</span>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">Game Rules</h2>
</div>
<ul class="space-y-4 mb-8">
<li class="flex items-start gap-4">
<div class="mt-1 min-w-[24px] h-6 flex items-center justify-center rounded-full bg-primary/10 text-primary text-xs font-bold">1</div>
<div>
<h3 class="font-bold text-slate-800 dark:text-slate-200 text-sm">Goal</h3>
<p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Align 5 pieces of your color on the hexagonal grid.</p>
</div>
</li>
<li class="flex items-start gap-4">
<div class="mt-1 min-w-[24px] h-6 flex items-center justify-center rounded-full bg-primary/10 text-primary text-xs font-bold">2</div>
<div>
<h3 class="font-bold text-slate-800 dark:text-slate-200 text-sm">Movement</h3>
<p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">Tap an empty cell to place your piece.</p>
</div>
</li>
<li class="flex items-start gap-4">
<div class="mt-1 min-w-[24px] h-6 flex items-center justify-center rounded-full bg-primary/10 text-primary text-xs font-bold">3</div>
<div>
<h3 class="font-bold text-slate-800 dark:text-slate-200 text-sm">Special</h3>
<p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed"><span class="text-primary font-medium">Red pieces</span> are neutral and cannot be moved.</p>
</div>
</li>
</ul>
<button class="w-full h-12 bg-primary hover:bg-red-600 text-white rounded-xl font-bold shadow-lg shadow-primary/25 transition-all active:scale-95 flex items-center justify-center gap-2">
<span>Got it</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</div>

</body></html>
